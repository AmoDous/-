name: Rooms hotfix

on:
  push:
    paths:
      - '.github/workflows/rooms-hotfix.yml'

permissions:
  contents: write

jobs:
  patch-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch reset button wiring
        run: |
          python - <<'PY'
          from pathlib import Path
          index = Path('index.html')
          html = index.read_text(encoding='utf-8')
          old = 'showAll:$("showAll"),scenarioGrid:$("scenarioGrid")'
          new = 'showAll:$("showAll"),resetButton:$("resetButton"),scenarioGrid:$("scenarioGrid")'
          if old in html and new not in html:
              html = html.replace(old, new, 1)
          index.write_text(html, encoding='utf-8')
          workflow = Path('.github/workflows/rooms-hotfix.yml')
          if workflow.exists():
              workflow.unlink()
          PY
          git config user.name "rooms-bot"
          git config user.email "rooms-bot@users.noreply.github.com"
          git add index.html .github/workflows/rooms-hotfix.yml
          if ! git diff --cached --quiet; then
            git commit -m "Fix reset button wiring"
            git push
          fi
