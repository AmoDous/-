openapi: 3.1.0
info:
  title: Rooms API
  version: 0.12.0
  description: |
    Contract for the Rooms MVP backend. GitHub Pages remains a static frontend;
    the local Fastify service provides PostgreSQL-backed API endpoints.
servers:
  - url: http://localhost:3001
    description: Local development
  - url: https://api.rooms.example
    description: Production placeholder
tags:
  - name: Public
  - name: Auth
  - name: Client
  - name: Partner
  - name: Admin
  - name: Payments
  - name: Accounting

paths:
  /health:
    get:
      tags: [Public]
      operationId: getHealth
      responses:
        '200':
          description: Service health
          content:
            application/json:
              schema:
                type: object
                required: [status, database, storage, time]
                properties:
                  status: {type: string, const: ok}
                  database: {type: string, enum: [up, down]}
                  storage: {type: string, enum: [memory, postgresql]}
                  time: {type: string, format: date-time}

  /v1/cities:
    get:
      tags: [Public]
      operationId: listCities
      responses:
        '200':
          description: Supported cities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/City'

  /v1/cities/{cityId}/stats:
    get:
      tags: [Public]
      operationId: getCityStats
      parameters:
        - name: cityId
          in: path
          required: true
          description: City id returned by /v1/cities or its exact display name.
          schema: {type: string}
      responses:
        '200':
          description: Public supply counts and privacy-safe audience bucket
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CityStats'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/rooms:
    get:
      tags: [Public]
      operationId: searchRooms
      parameters:
        - {name: city, in: query, required: true, schema: {type: string}}
        - {name: date, in: query, schema: {type: string, format: date}}
        - {name: time, in: query, schema: {type: string, pattern: '^([01][0-9]|2[0-3]):[0-5][0-9]$'}}
        - {name: durationMinutes, in: query, schema: {type: integer, minimum: 30, multipleOf: 30}}
        - {name: guests, in: query, schema: {type: integer, minimum: 1}}
        - {name: type, in: query, schema: {type: string}}
        - {name: features, in: query, schema: {type: array, items: {type: string}}, style: form, explode: false}
        - {name: maxPricePerHour, in: query, schema: {type: number, minimum: 0}}
        - {name: sort, in: query, schema: {type: string, enum: [rating, price, capacity], default: rating}}
        - {name: cursor, in: query, schema: {type: string}}
      responses:
        '200':
          description: Published rooms and optional availability summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomSearchResult'
        '400':
          $ref: '#/components/responses/ValidationError'

  /v1/rooms/{roomId}:
    get:
      tags: [Public]
      operationId: getRoom
      parameters:
        - $ref: '#/components/parameters/RoomId'
        - {name: date, in: query, schema: {type: string, format: date}}
      responses:
        '200':
          description: Room detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomDetail'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/rooms/{roomId}/reviews:
    get:
      tags: [Public]
      operationId: listRoomReviews
      parameters:
        - $ref: '#/components/parameters/RoomId'
      responses:
        '200':
          description: Approved reviews for a published room with privacy-safe author names
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicReviewPage'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/availability/search:
    post:
      tags: [Public]
      operationId: searchAvailability
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AvailabilityRequest'
      responses:
        '200':
          description: Free starts and maximum duration for each start
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvailabilityResponse'
        '400':
          $ref: '#/components/responses/ValidationError'

  /v1/auth/client/register:
    post:
      tags: [Auth]
      operationId: registerClient
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClientRegistration'
      responses:
        '201':
          description: Client account and session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSession'
        '409':
          $ref: '#/components/responses/Conflict'

  /v1/auth/login:
    post:
      tags: [Auth]
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [login, password]
              properties:
                login: {type: string}
                password: {type: string, minLength: 1}
      responses:
        '200':
          description: Authenticated session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSession'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/auth/password-reset/request:
    post:
      tags: [Auth]
      operationId: requestPasswordReset
      description: Always returns the same accepted response so an account cannot be discovered by login enumeration.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [login]
              properties:
                login: {type: string, minLength: 3, maxLength: 254}
      responses:
        '202':
          description: Reset delivery accepted regardless of whether the account exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordResetAccepted'
        '429':
          $ref: '#/components/responses/ValidationError'

  /v1/auth/password-reset/confirm:
    post:
      tags: [Auth]
      operationId: confirmPasswordReset
      description: Consumes a one-time reset token, changes the password and revokes every existing session.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, newPassword]
              properties:
                token: {type: string, minLength: 32, maxLength: 200}
                newPassword: {type: string, minLength: 8, maxLength: 128}
      responses:
        '204': {description: Password changed and existing sessions revoked}
        '400':
          $ref: '#/components/responses/ValidationError'

  /v1/auth/refresh:
    post:
      tags: [Auth]
      operationId: refreshSession
      description: Rotates the HttpOnly refresh cookie and returns a new access token.
      security:
        - refreshCookie: []
      responses:
        '200':
          description: Session refreshed and refresh cookie rotated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSession'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/auth/logout:
    post:
      tags: [Auth]
      operationId: logout
      security:
        - bearerAuth: []
        - refreshCookie: []
      responses:
        '204': {description: Session revoked}

  /v1/me:
    get:
      tags: [Client]
      operationId: getCurrentUser
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
    patch:
      tags: [Client]
      operationId: updateCurrentUser
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClientProfileUpdate'
      responses:
        '200':
          description: Updated client profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'

  /v1/me/sessions:
    get:
      tags: [Client]
      operationId: listCurrentUserSessions
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Active sessions owned by the current user
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items: {$ref: '#/components/schemas/UserSession'}
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/me/sessions/others:
    delete:
      tags: [Client]
      operationId: revokeOtherCurrentUserSessions
      security:
        - bearerAuth: []
      responses:
        '204': {description: Every active session except the current one was revoked}
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/me/sessions/{sessionId}:
    delete:
      tags: [Client]
      operationId: revokeCurrentUserSession
      security:
        - bearerAuth: []
      parameters:
        - name: sessionId
          in: path
          required: true
          schema: {type: string, format: uuid}
      responses:
        '204': {description: Owned session revoked}
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/me/notification-settings:
    get:
      tags: [Client]
      operationId: getNotificationSettings
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Notification channels
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationSettings'
    patch:
      tags: [Client]
      operationId: updateNotificationSettings
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotificationSettings'
      responses:
        '200':
          description: Updated channels
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationSettings'

  /v1/me/notification-settings/test:
    post:
      tags: [Client]
      operationId: testNotificationSettings
      security:
        - bearerAuth: []
      responses:
        '202':
          description: Test deliveries accepted by the server queue
          content:
            application/json:
              schema:
                type: object
                required: [accepted, deliveries]
                properties:
                  accepted: {type: boolean, const: true}
                  deliveries:
                    type: array
                    items:
                      $ref: '#/components/schemas/NotificationDelivery'
        '409':
          description: All external channels are disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/me/notification-deliveries:
    get:
      tags: [Client]
      operationId: listOwnNotificationDeliveries
      security:
        - bearerAuth: []
      parameters:
        - {name: status, in: query, schema: {type: string, enum: [queued, processing, sent, failed, cancelled]}}
        - {name: channel, in: query, schema: {type: string, enum: [email, telegram]}}
        - {name: limit, in: query, schema: {type: integer, minimum: 1, maximum: 200, default: 50}}
      responses:
        '200':
          description: Masked delivery history for the authenticated account
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NotificationDelivery'
  /v1/me/reviews:
    get:
      tags: [Client]
      operationId: listCurrentClientReviews
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Reviews submitted by the authenticated client, including moderation feedback
          content:
            application/json:
              schema:
                type: array
                items: {$ref: '#/components/schemas/ReviewRecord'}
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/me/support:
    get:
      tags: [Client]
      operationId: listCurrentClientSupportCases
      security:
        - bearerAuth: []
      parameters:
        - {name: status, in: query, schema: {type: string, enum: [open, working, closed, all]}}
        - {name: limit, in: query, schema: {type: integer, minimum: 1, maximum: 200, default: 80}}
      responses:
        '200':
          description: Support cases for bookings owned by the authenticated client
          content:
            application/json:
              schema:
                type: array
                items: {$ref: '#/components/schemas/SupportCase'}
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/bookings:
    get:
      tags: [Client]
      operationId: listClientBookings
      security:
        - bearerAuth: []
      parameters:
        - {name: statusGroup, in: query, schema: {type: string, enum: [active, completed, cancelled, all]}}
      responses:
        '200':
          description: Client bookings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Booking'
    post:
      tags: [Client]
      operationId: createBooking
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookingCreate'
      responses:
        '201':
          description: New request. The slot is not blocked yet.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        '409':
          $ref: '#/components/responses/SlotConflict'

  /v1/bookings/{bookingId}:
    get:
      tags: [Client]
      operationId: getBooking
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BookingId'
      responses:
        '200':
          description: Booking visible to the current role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/bookings/{bookingId}/cancel:
    post:
      tags: [Client]
      operationId: cancelBooking
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BookingId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason: {type: string, minLength: 3, maxLength: 1000}
      responses:
        '200':
          description: Cancelled booking or refund review created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'

  /v1/bookings/{bookingId}/complete:
    post:
      tags: [Client]
      operationId: completeClientBooking
      description: Marks a paid booking as completed after its end time and unlocks review submission.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BookingId'
      responses:
        '200':
          description: Completed booking
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Booking'}
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /v1/bookings/{bookingId}/review:
    post:
      tags: [Client]
      operationId: submitBookingReview
      description: Creates one pending review for a completed booking, or resubmits its rejected review.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BookingId'
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/ReviewSubmit'}
      responses:
        '201':
          description: Review queued for moderation
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ReviewRecord'}
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /v1/bookings/{bookingId}/messages:
    get:
      tags: [Client, Partner]
      operationId: listBookingMessages
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BookingId'
      responses:
        '200':
          description: Visible booking messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BookingMessage'
    post:
      tags: [Client, Partner]
      operationId: createBookingMessage
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BookingId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [body]
              properties:
                body: {type: string, minLength: 1, maxLength: 1000}
      responses:
        '201':
          description: Message accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingMessage'
        '422':
          description: Direct contact details are blocked before payment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/bookings/{bookingId}/support:
    get:
      tags: [Client, Partner, Admin]
      operationId: listBookingSupportCases
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BookingId'
      responses:
        '200':
          description: Support history visible to the authenticated booking participant
          content:
            application/json:
              schema:
                type: array
                items: {$ref: '#/components/schemas/SupportCase'}
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [Client, Partner, Admin]
      operationId: openBookingSupportCase
      description: Opens a case or appends the message to the current non-closed case for this booking.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BookingId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [topic, body]
              properties:
                topic: {type: string, minLength: 3, maxLength: 200}
                body: {type: string, minLength: 5, maxLength: 3000}
      responses:
        '201':
          description: Support case created or updated
          content:
            application/json:
              schema: {$ref: '#/components/schemas/SupportCase'}
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/support/{supportId}/messages:
    post:
      tags: [Client, Partner, Admin]
      operationId: createSupportMessage
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/SupportId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [body]
              properties:
                body: {type: string, minLength: 5, maxLength: 3000}
      responses:
        '201':
          description: Message appended to the support case
          content:
            application/json:
              schema: {$ref: '#/components/schemas/SupportCase'}
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /v1/bookings/{bookingId}/proposal/accept:
    post:
      tags: [Client]
      operationId: acceptBookingTimeProposal
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BookingId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [proposalId]
              properties:
                proposalId: {type: string, format: uuid}
      responses:
        '200':
          description: Proposal accepted and all booking rooms held for 15 minutes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Proposal changed or its slot is no longer available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/bookings/{bookingId}/proposal/decline:
    post:
      tags: [Client]
      operationId: declineBookingTimeProposal
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BookingId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [proposalId]
              properties:
                proposalId: {type: string, format: uuid}
      responses:
        '200':
          description: Proposal declined and request returned to the partner queue
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Proposal has already changed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/bookings/{bookingId}/payment-intent:
    post:
      tags: [Payments]
      operationId: createPaymentIntent
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BookingId'
      responses:
        '201':
          description: Server-calculated payment intent; an external provider returns a hosted payment page URL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentIntent'
        '409':
          $ref: '#/components/responses/SlotConflict'

  /v1/payments/{paymentId}/demo-complete:
    post:
      tags: [Payments]
      operationId: completeDemoPayment
      description: Local development adapter. Disabled when ENABLE_DEMO_PAYMENTS is false.
      security:
        - bearerAuth: []
      parameters:
        - name: paymentId
          in: path
          required: true
          schema: {type: string, format: uuid}
      responses:
        '200':
          description: The hold was atomically converted into a paid booking
          content:
            application/json:
              schema:
                type: object
                required: [payment, booking]
                properties:
                  payment: {$ref: '#/components/schemas/PaymentIntent'}
                  booking: {$ref: '#/components/schemas/Booking'}
        '409':
          description: Hold expired or booking state changed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/payments/webhooks/sber:
    post:
      tags: [Payments]
      operationId: handleSberWebhook
      description: The callback is never trusted by itself. Rooms queries getOrderStatusExtended server-to-server before changing payment or booking state.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [mdOrder, orderNumber, operation, status]
              properties:
                mdOrder: {type: string, format: uuid}
                orderNumber: {type: string, minLength: 1, maxLength: 36}
                operation:
                  type: string
                  enum: [created, approved, deposited, reversed, refunded, declinedByTimeout, subscriptionCreated]
                status: {type: integer, minimum: 0, maximum: 1}
                additionalParams: {type: object, additionalProperties: true}
      responses:
        '200':
          description: Event verified and processed idempotently
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status: {type: string, const: ok}
        '409':
          description: Provider order or deposited amount does not match the Rooms transaction
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
        '502':
          description: The bank status could not be verified
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}

  /v1/partner/bank-account:
    get:
      tags: [Partner]
      operationId: getPartnerBankAccount
      description: Returns only masked requisites. The full settlement account is never exposed by the API.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Masked bank account assigned to the partner venue
          content:
            application/json:
              schema: {$ref: '#/components/schemas/BankAccount'}
        '404': {$ref: '#/components/responses/NotFound'}
    put:
      tags: [Partner]
      operationId: updatePartnerBankAccount
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/PartnerBankAccountWrite'}
      responses:
        '200':
          description: Requisites encrypted at rest and returned in masked form; verification is reset
          content:
            application/json:
              schema: {$ref: '#/components/schemas/BankAccount'}
        '404': {$ref: '#/components/responses/NotFound'}

  /v1/partner/payouts:
    get:
      tags: [Partner]
      operationId: listPartnerPayouts
      security:
        - bearerAuth: []
      parameters:
        - {name: status, in: query, schema: {type: string, enum: [draft, sent, paid, cancelled, all], default: all}}
        - {name: limit, in: query, schema: {type: integer, minimum: 1, maximum: 200, default: 80}}
      responses:
        '200':
          description: Payout batches belonging only to the authenticated partner venue
          content:
            application/json:
              schema:
                type: array
                items: {$ref: '#/components/schemas/PayoutBatch'}

  /v1/accounting/overview:
    get:
      tags: [Accounting]
      operationId: getFinanceOverview
      description: Available to accountant and admin roles.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Aggregated payout and refund amounts
          content:
            application/json:
              schema: {$ref: '#/components/schemas/FinanceOverview'}
        '403': {$ref: '#/components/responses/Forbidden'}

  /v1/accounting/receipts:
    get:
      tags: [Accounting]
      operationId: listFiscalReceipts
      description: Durable online-cash-register queue and fiscal receipt history. Available to accountant and admin roles.
      security:
        - bearerAuth: []
      parameters:
        - {name: status, in: query, schema: {type: string, enum: [queued, processing, succeeded, failed, cancelled, all], default: all}}
        - {name: limit, in: query, schema: {type: integer, minimum: 1, maximum: 200, default: 80}}
      responses:
        '200':
          description: Fiscal receipt queue and history
          content:
            application/json:
              schema:
                type: array
                items: {$ref: '#/components/schemas/FiscalReceipt'}
        '403': {$ref: '#/components/responses/Forbidden'}

  /v1/accounting/receipts/{receiptId}/retry:
    post:
      tags: [Accounting]
      operationId: retryFiscalReceipt
      description: Requeues a failed or manually cancelled fiscal receipt and resets its attempt counter. The action is audited.
      security:
        - bearerAuth: []
      parameters:
        - name: receiptId
          in: path
          required: true
          schema: {type: string, format: uuid}
      responses:
        '202':
          description: Receipt returned to the cash-register queue
          content:
            application/json:
              schema: {$ref: '#/components/schemas/FiscalReceiptAction'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '404': {$ref: '#/components/responses/NotFound'}
        '409': {$ref: '#/components/responses/Conflict'}

  /v1/accounting/receipts/{receiptId}/cancel:
    post:
      tags: [Accounting]
      operationId: cancelFiscalReceipt
      description: Cancels a queued or failed receipt before it is claimed by a cash-register worker. The action is audited.
      security:
        - bearerAuth: []
      parameters:
        - name: receiptId
          in: path
          required: true
          schema: {type: string, format: uuid}
      responses:
        '200':
          description: Receipt job cancelled
          content:
            application/json:
              schema: {$ref: '#/components/schemas/FiscalReceiptAction'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '404': {$ref: '#/components/responses/NotFound'}
        '409': {$ref: '#/components/responses/Conflict'}

