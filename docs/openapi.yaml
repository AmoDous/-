            schema:
              type: object
              additionalProperties: false
              properties:
                providerOperationId: {type: string, minLength: 3, maxLength: 200}
      responses:
        '200':
          description: Refund completed idempotently and client notification queued
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Refund'}
        '404': {$ref: '#/components/responses/NotFound'}
        '409': {$ref: '#/components/responses/Conflict'}

  /v1/accounting/refunds/{refundId}/retry:
    post:
      tags: [Accounting]
      operationId: retryRefund
      description: Requeues a failed automatic refund. A previously submitted refund is checked at the bank and is not submitted twice.
      security:
        - bearerAuth: []
      parameters:
        - name: refundId
          in: path
          required: true
          schema: {type: string, format: uuid}
      responses:
        '202':
          description: Refund returned to the automatic queue
          content:
            application/json:
              schema:
                type: object
                required: [id, status]
                properties:
                  id: {type: string, format: uuid}
                  status: {type: string, const: refund_pending}
