    get:
      tags: [Accounting]
      operationId: listVenueBankAccounts
      security:
        - bearerAuth: []
      parameters:
        - {name: status, in: query, schema: {type: string, enum: [pending, verified, all], default: all}}
        - {name: limit, in: query, schema: {type: integer, minimum: 1, maximum: 200, default: 80}}
